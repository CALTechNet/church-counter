
version: "3.9"

services:
  attendance:
    build: .
    container_name: church-attendance
    restart: unless-stopped
    ports:
      - "80:8000"
    volumes:
      - ./data:/data          # SQLite database — persists between restarts
      - ./config:/config      # Drop your seats.svg here
      - ./models:/models      # Persisted YOLO model weights (incl. OpenVINO export)
    mem_limit: 4g
    memswap_limit: 4g
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Chicago
      # YOLO memory tuning — lower these if the container still OOMs
      - TILE_BATCH_SIZE=4   # tiles processed per YOLO call (raise to 8-12 on 16 GB+ hosts)
      - YOLO_IMGSZ=640      # inference image size per tile (1280 for higher accuracy)
    network_mode: bridge      # Must reach camera at 10.10.140.140
    extra_hosts:
      - "host.docker.internal:host-gateway"
