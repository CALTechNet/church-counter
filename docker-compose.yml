
version: "3.9"

services:
  attendance:
    build: .
    container_name: church-attendance
    restart: unless-stopped
    ports:
      - "80:8000"
    volumes:
      - ./data:/data          # SQLite database — persists between restarts
      - ./config:/config      # Drop your seats.svg here
      - ./models:/models      # Persisted YOLO model weights (incl. OpenVINO export)
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Chicago
    network_mode: bridge      # Must reach camera at 10.10.140.140
    extra_hosts:
      - "host.docker.internal:host-gateway"
